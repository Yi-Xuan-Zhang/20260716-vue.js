<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vue簡易計算機</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="calculator">
        <h1>計算機</h1>
        <div class="input-group">
             <label for="num1">數字1</label>
             <input id="num1" type="number" v-model="num1" placeholder="請輸入數字">
        </div>
       <div class="input-group">
        <label for="num2">數字2</label>
        <input id="num2" type="number" v-model="num2" placeholder="請輸入數字">
       </div>
       <!-- v-model 自動處理「綁定資料（v-bind）」與「監聽輸入事件（v-on）」 -->
       <div class="buttons">
        <!-- 呼叫函式並帶參數 -->
        <button @click="calculate('+')">+</button>
      <button @click="calculate('-')">-</button>
      <button @click="calculate('*')">×</button>
      <button @click="calculate('/')">÷</button>
       </div> 
    
    <div v-if="errorMsg" class="error">{{ errorMsg }}</div>
    <div v-else-if="result !== null" :class="['result', { negative: result < 0 }]">
      結果：{{ result }}
    </div>
    <!-- 優先展示錯誤訊息，若無錯誤且有計算結果時，顯示結果並根據數值正負動態切換樣式。 -->
    </div>
   
    <script>
        const {createApp, ref } = Vue 

        createApp({
            setup() {
    const num1 = ref('');
    const num2 = ref('');
    const result = ref(null);
    const errorMsg = ref('');
 
    function calculate(operator) {
      errorMsg.value = '';  // 清空錯誤訊息
      result.value = null; // 清空上一次的結果
 
      const a = parseFloat(num1.value);
      const b = parseFloat(num2.value);
 
      if (isNaN(a) || isNaN(b)) {
        errorMsg.value = '請輸入有效的數字';
        return;
      }
 //寫法1
      let value;
      switch (operator) {
        case '+':
          value = a + b;
          break; //這個 case 處理完了，跳出 switch
        case '-':
          value = a - b;
          break;
        case '*':
          value = a * b;
          break;
        case '/':
          if (b === 0) {
            errorMsg.value = '除數不可為 0';
            return;
          }
          value = a / b;
          break;
      }
 //寫法2
//  if (operator === '+') {
//   value = a + b;
// } else if (operator === '-') {
//   value = a - b;
// } else if (operator === '*') {
//   value = a * b;
// } else if (operator === '/') {
//   if (b === 0) {
//     errorMsg.value = '除數不可為 0';
//     return;
//   }
//   value = a / b;
// }

      // 避免浮點數運算產生過長小數
      result.value = Math.round(value * 1000000) / 1000000;
    }
 
    // 使用 return 將資料與方法暴露給 template 使用
    return {
      num1,
      num2,
      result,
      errorMsg,
      calculate
    };
  }
}).mount('#calculator')
</script>
</body>
</html>
