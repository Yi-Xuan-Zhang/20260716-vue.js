<!DOCTYPE html>
<html lang="zh-hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue基礎語法-條件渲染</title>

  <style>
    .box {
      width: 200px;
      height: 200px;
      border: 2px solid #000;
      border-radius: 8px;
    }

    .red {
      background-color: red;
    }

    .blue {
      background-color: blue;
    }
  </style>
</head>
<body>
  <!-- 引入 VUE CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <div id="app">
    <button type="button" @click="isShow = !isShow">
      顯示/隱藏
    </button>
    <!-- 用 v-if / v-else 來條件渲染 -->
    <!-- DOM 會消失，通常用在不想讓人看到隱藏DOM的時候 -->
    <!-- 效能損耗相對較大，使用者較少操作導致變化的情況下使用 -->
    <div v-if="isShow" class="box red"></div>
    <div v-else class="box blue"></div>

    <!-- 用 v-show 來條件渲染 -->
    <!-- 僅在 DOM 上加入 display: none，打開F12還是看得到 -->
    <!-- 效能損耗相對較小，使用者較常操作導致變化的情況下使用 -->
    <div v-show="isShow" class="box red"></div>
    <div v-show="!isShow" class="box blue"></div>
  </div>
  

  <script>
    // 從 VUE 中取出 createApp 及 ref 來使用(按需引入)
    const { createApp, ref } = Vue;
    
    // 初始化 VUE
    createApp({
      setup() {
        const isShow = ref(true);

        // 將變數/函式丟出去給 DOM 元素使用
        return {
          isShow,
        };
      },
    }).mount('#app');
    // mount() 指的是將 VUE 掛在指定的 DOM 元素上
  </script>
</body>
</html>
